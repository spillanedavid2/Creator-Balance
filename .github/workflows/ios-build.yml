name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install iOS dependencies
      run: |
        cd ios/App
        pod install
    
    - name: Build iOS
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -destination generic/platform=iOS archive -archivePath build/App.xcarchive
    
    - name: Export iOS App
      run: |
        xcodebuild -exportArchive -archivePath ios/App/build/App.xcarchive -exportPath ios/App/build -exportOptionsPlist ios/App/ExportOptions.plist
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: CreatorBalance-ipa
        path: ios/App/build/App.ipa


